<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
      content="script-src 'self' 'wasm-unsafe-eval' https://cdn.jsdelivr.net;">

    <title>Reflective</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>

</head>

<body>
    <main>
        <button id="toggle-ui-button" title="Show/Hide Controls">∅</button>
        <form id="controls">
            <div id="flowAngle-group">
                <label for="flowAngle">Flow Angle</label><br>
                <input type="range" id="flowAngle" min="0" max="6.283" step="0.01" value="0.785">
                <span id="flowAngleValue"></span>
                <!--<label><input type="checkbox" id="animateFlowAngle"> Animate</label>-->
            </div>
            <div>
                <label for="turbulence">Turbulence</label><br>
                <input type="range" id="turbulence" min="0.015" max="0.05" step="0.001" value="0.015">
                <span id="turbulenceValue"></span>
                <!--<label><input type="checkbox" id="animateTurbulence"> Animate</label>-->
            </div>
            <div>
                <label for="lineCount">Line Count</label><br>
                <input type="range" id="lineCount" min="150" max="300" step="50" value="150">
                <span id="lineCountValue"></span>
                <!--<label><input type="checkbox" id="animateLineCount"> Animate</label>-->
            </div>
            <div id="lineThickness-group">
                <label for="lineThickness">Line Thickness</label><br>
                <input type="range" id="lineThickness" min="1" max="10" step="0.5" value="1">
                <span id="lineThicknessValue">1.5</span>
            </div>
            <div>
                <label for="paletteSelect">Colour Palette</label><br>
                <select id="paletteSelect">
                    <option value="Yellow">Yellow</option>
                    <option value="LightYellow">Light Yellow</option>
                    <option value="Red">Red</option>
                    <option value="LightRed">Light Red</option>
                    <option value="Green">Green</option>
                    <option value="LightGreen">Light Green</option>
                    <option value="Grey">Grey</option>
                    <option value="LightGrey">Light Grey</option>
                </select>
            </div>
            
            <input type="file" id="upload-svg-input" accept=".svg">
            <button type="button" id="upload-svg-button">Upload SVG</button>
            <div>
            <select id="preloadedSvgSelect">
                <option value="">-- Select SVG --</option>
                <option value="icons/cloud.svg">Cloud</option>
                <option value="icons/leaf.svg">Leaf</option>
                <option value="icons/loader.svg">Loader</option>
                <option value="icons/sun.svg">Sun</option>
                <option value="icons/sunrise.svg">Sunrise</option>
                <option value="icons/sunset.svg">Sunset</option>
                <option value="icons/thermometer-sun.svg">Thermometer Sun</option>
                
            </select>
            </div>
                        <div>
                <button type="button" id="clearDrawing">Clear Drawing</button>
            </div>
            <div>
                <label>
                    <input type="checkbox" id="hideSvgOverlay" checked>
                    Show SVG Outline
                </label>
            </div>
            <div>
                <label for="svgOutlineThreshold">SVG Gap Threshold</label><br>
                <input type="range" id="svgOutlineThreshold" min="0" max="100" step="1" value="10">
                <span id="svgOutlineThresholdValue"></span>
            </div>
            <button type="button" id="export-svg">Save</button>
        </form>
        <div id="svg-overlay"></div>
    </main>

    <script src="script.js"></script>
    <script src="p5.min.js"></script>
</body>

</html>
